<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Coursera Deadline Tracker</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f3f5f7;
        color: #111827;
      }
      main {
        width: 360px;
        padding: 14px;
        display: grid;
        gap: 12px;
      }
      h1 {
        margin: 0;
        font-size: 18px;
      }
      .card {
        background: #fff;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        padding: 10px;
        display: grid;
        gap: 8px;
      }
      .row {
        display: grid;
        gap: 6px;
      }
      label {
        font-size: 12px;
        color: #374151;
      }
      input {
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        padding: 8px;
        font-size: 13px;
      }
      button {
        border: 0;
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 13px;
        cursor: pointer;
      }
      .primary {
        background: #0f766e;
        color: #fff;
      }
      .secondary {
        background: #e2e8f0;
        color: #111827;
      }
      .muted {
        font-size: 12px;
        color: #64748b;
      }
      .hidden {
        display: none;
      }
      #status-banner {
        font-size: 12px;
        padding: 8px;
        border-radius: 8px;
        background: #e2e8f0;
      }
      #status-banner.error {
        background: #fee2e2;
        color: #7f1d1d;
      }
      #status-banner.ok {
        background: #dcfce7;
        color: #14532d;
      }
      #token-hint {
        word-break: break-all;
      }
      #status-view {
        font-size: 12px;
        background: #f8fafc;
        border-radius: 8px;
        padding: 8px;
        border: 1px dashed #cbd5e1;
      }
      .action-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Coursera Deadline Tracker</h1>
      <div id="status-banner">Idle</div>

      <section class="card">
        <strong>Quick Setup</strong>
        <div class="row">
          <label for="display-name">Name (optional)</label>
          <input id="display-name" type="text" placeholder="Satty" />
        </div>
        <div id="onboarding-hint" class="muted">Connect Telegram to begin.</div>
        <div class="action-grid">
          <button id="onboarding-btn" class="primary" type="button">Connect Telegram</button>
          <button id="open-telegram-btn" class="secondary hidden" type="button">Open Telegram</button>
        </div>
      </section>

      <section class="card">
        <strong>Coursera Detection</strong>
        <div class="muted">Open your Coursera degree page once so IDs can be detected automatically.</div>
        <div id="autodetect-hint" class="muted">No auto-detected IDs yet.</div>
        <button id="open-coursera-btn" class="secondary" type="button">Open Coursera</button>
      </section>

      <section class="card">
        <strong>Sync</strong>
        <div class="action-grid">
          <button id="fetch-btn" class="primary" type="button">Fetch Now</button>
          <button id="status-btn" class="secondary" type="button">Refresh Status</button>
        </div>
        <div id="status-view">No status yet.</div>
      </section>

      <section class="card">
        <div class="muted">Current token/user</div>
        <div id="token-hint" class="muted">Not registered</div>
      </section>

      <div id="dev-knobs-root"></div>
    </main>

    <script src="popup.ts"></script>
  </body>
</html>
